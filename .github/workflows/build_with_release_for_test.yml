name: Build and Release for Test
on:
  #push:
  workflow_dispatch:
jobs:
  build:
    runs-on:
      group: Bitrise-M4Pro
    env:
      ARCHIVE_PATH: ${{ github.workspace }}/build/PocketCasts.xcarchive
    steps:
      - name: Setup Pocket Casts iOS
        run: |
          git clone --depth=1 --recurse-submodules https://github.com/benbitrise/pocket-casts-ios
          cd pocket-casts-ios
          make install_dependencies
          make external_contributor

      - name: Enable Xcode Build Cache
        shell: bash
        env:
          BITRISE_BUILD_CACHE_AUTH_TOKEN: ${{ secrets.BITRISE_PAT }}
          BITRISE_BUILD_CACHE_WORKSPACE_ID: ${{ secrets.BITRISE_WORKSPACE_ID }}
        run: |
          set -euxo pipefail
          curl --retry 5 -sSfL 'https://raw.githubusercontent.com/bitrise-io/bitrise-build-cache-cli/main/install/installer.sh' | sh -s -- -b /tmp/bin -d
          /tmp/bin/bitrise-build-cache activate xcode --cache --cache-push

      - name: Install signing certificate and provisioning profile
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          set -euxo pipefail

          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Install the provisioning profile
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_PATH"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "Installed certificate and profile ($PROFILE_UUID)"

      - name: Build app
        env:
          DEVELOPER_DIR: /Applications/Xcode-26.2.0.app/Contents/Developer
        run: |
          cd pocket-casts-ios
          set -o pipefail && xcodebuild archive \
            -project podcasts.xcodeproj \
            -scheme "Pocket Casts Prototype Build" \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" | xcpretty

      - name: Export IPA
        env:
          DEVELOPER_DIR: /Applications/Xcode-26.2.0.app/Contents/Developer
        run: |
          set -euxo pipefail

          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "${{ github.workspace }}/build/export" \
            -exportOptionsPlist ExportOptions.plist

          IPA_PATH=$(find "${{ github.workspace }}/build/export" -name "*.ipa" | head -n 1)
          echo "ARTIFACT_PATH=$IPA_PATH" >> "$GITHUB_ENV"
          echo "Exported IPA: $IPA_PATH ($(stat -f%z "$IPA_PATH") bytes)"

      - name: Clean up signing
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/certificate.p12" "$RUNNER_TEMP/profile.mobileprovision"

      - name: Upload to Bitrise Release Management
        env:
          AUTHORIZATION_TOKEN: ${{ secrets.BITRISE_PAT }}
          CONNECTED_APP_ID: ${{ vars.BITRISE_CONNECTED_APP_ID }}
          BRANCH: ${{ github.ref_name }}
          WORKFLOW: ${{ github.workflow }}
        run: |
          set -euxo pipefail

          # Clone the Bitrise scripts repository to get all necessary utility files
          git clone --depth=1 https://github.com/bitrise-io/release-management-recipes.git

          # Verify the artifact exists and has a size
          echo "Uploading artifact: $ARTIFACT_PATH"
          ls -la "$ARTIFACT_PATH"

          # Run the upload script
          /bin/bash ./release-management-recipes/api/upload_installable_artifact.sh
